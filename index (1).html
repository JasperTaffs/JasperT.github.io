<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jasper Taffs — MEng Mechanical Engineer</title>
  <meta name="description" content="Mechanical Engineering portfolio of Jasper Taffs, MEng student at the University of Leeds." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       EASY UPDATE ZONE — change colours/fonts here
    ============================================= */
    :root {
      --accent:       #1D6FAA;   /* main blue accent */
      --accent-light: #E8F2FA;   /* light tint for tags */
      --accent-dark:  #0F4C7A;   /* hover shade */
      --bg:           #F7F8FA;   /* page background */
      --surface:      #FFFFFF;   /* card background */
      --text:         #1A1A2E;   /* primary text */
      --muted:        #6B7280;   /* secondary text */
      --border:       #E5E7EB;   /* borders */
      --nav-h:        64px;      /* navbar height */
      --font-head:    'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
      --radius:       12px;
    }

    /* =============================================
       BASE RESET
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* =============================================
       NAVBAR
    ============================================= */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1rem, 5vw, 4rem);
    }
    .nav-logo {
      font-family: var(--font-head);
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }
    .nav-links a {
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--border); }
    .nav-links a.active { color: var(--accent); }
    .nav-cta {
      background: var(--accent);
      color: #fff !important;
      border-radius: 8px;
      padding: 0.4rem 1rem !important;
    }
    .nav-cta:hover { background: var(--accent-dark) !important; color: #fff !important; }

    /* hamburger for mobile */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.2s, opacity 0.2s;
    }

    /* =============================================
       HERO
    ============================================= */
    .hero {
      max-width: 900px;
      margin: 0 auto;
      padding: clamp(3rem, 8vw, 6rem) clamp(1rem, 5vw, 2rem) 4rem;
      display: flex;
      align-items: center;
      gap: 3rem;
    }
    .hero-text { flex: 1; }
    .hero-eyebrow {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .hero-name {
      font-family: var(--font-head);
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    .hero-sub {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 42ch;
      margin-bottom: 2rem;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-outline { border-color: var(--border); color: var(--text); background: var(--surface); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .hero-avatar {
      width: 180px; height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--surface);
      box-shadow: 0 0 0 2px var(--border);
      flex-shrink: 0;
    }

    /* =============================================
       SECTION WRAPPER
    ============================================= */
    section {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem clamp(1rem, 5vw, 2rem);
      scroll-margin-top: var(--nav-h);
    }
    .section-label {
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: clamp(1.6rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .section-intro {
      color: var(--muted);
      max-width: 60ch;
      margin-bottom: 2.5rem;
    }
    hr.divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* =============================================
       PROJECTS — FILTER TABS + GRID
    ============================================= */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .filter-btn {
      padding: 0.35rem 1rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    .project-card[data-hidden="true"] { display: none; }
    .project-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--accent-light);
    }
    .project-body { padding: 1.25rem; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent);
    }
    .tag.completed { background: #ECFDF5; color: #065F46; }
    .project-title {
      font-family: var(--font-head);
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .project-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
    }
    .project-link:hover { color: var(--accent-dark); }

    /* =============================================
       PROJECT MODAL (lightbox)
    ============================================= */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      max-width: 680px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: sticky;
      top: 0;
      float: right;
      margin: 1rem 1rem 0 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      z-index: 10;
    }
    .modal-inner { padding: 1.5rem 2rem 2rem; clear: both; }
    .modal-title {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .modal-img-gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin: 1.25rem 0;
    }
    .modal-img-gallery img {
      border-radius: 8px;
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .modal-img-gallery img:first-child:nth-last-child(1) {
      grid-column: 1 / -1;
      height: 240px;
    }
    .modal-img-gallery img:first-child:nth-last-child(odd) {
      grid-column: 1 / -1;
    }

    /* =============================================
       ABOUT / SKILLS
    ============================================= */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }
    .about-bio p { color: var(--muted); margin-bottom: 1rem; }
    .skills-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .skill-item { display: flex; flex-direction: column; gap: 0.25rem; }
    .skill-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      font-weight: 500;
    }
    .skill-bar {
      height: 6px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }
    .skill-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      width: 0;
      transition: width 1s ease;
    }

    /* =============================================
       CONNECT / LINKS
    ============================================= */
    .connect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .connect-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.15s;
      font-weight: 500;
    }
    .connect-card:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .connect-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    /* =============================================
       FOOTER
    ============================================= */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 700px) {
      .hero { flex-direction: column-reverse; align-items: flex-start; gap: 1.5rem; }
      .hero-avatar { width: 120px; height: 120px; }
      .about-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .nav-links.open {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: var(--nav-h);
        left: 0; right: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 1rem;
        gap: 0.25rem;
      }
      .hamburger { display: flex; }
      .modal-img-gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>

<!-- =============================================
  JAVASCRIPT — renders all content from SITE_DATA
============================================= -->
<script>
(function() {
  const d = SITE_DATA;

  /* NAV logo */
  document.getElementById('nav-logo').innerHTML =
    d.name.split(' ').map((w,i) => i===1 ? `<span>${w}</span>` : w).join(' ');

  /* HERO */
  document.getElementById('hero-eyebrow').textContent = d.university;
  document.getElementById('hero-name').textContent = d.name;
  document.getElementById('hero-sub').textContent = d.role + ' — building things that matter.';

  const heroActions = document.getElementById('hero-actions');
  heroActions.innerHTML = `
    <a class="btn btn-primary" href="#projects">View projects</a>
    <a class="btn btn-outline" href="#connect">Get in touch</a>
  `;

  /* PROJECTS — build filter tabs */
  const categories = ['All', ...new Set(d.projects.map(p => p.category))];
  const filterBar = document.getElementById('filter-bar');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.project-card').forEach(card => {
        card.dataset.hidden = (cat !== 'All' && card.dataset.category !== cat) ? 'true' : 'false';
      });
    });
    filterBar.appendChild(btn);
  });

  document.getElementById('projects-intro').textContent =
    'A selection of engineering projects — from energy harvesting to medical devices.';

  /* PROJECTS — build cards */
  const grid = document.getElementById('projects-grid');
  d.projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.dataset.category = p.category;
    card.dataset.hidden = 'false';
    card.innerHTML = `
      <img class="project-img" src="${p.coverImage}" alt="${p.title}" loading="lazy" />
      <div class="project-body">
        <div class="project-tags">
          <span class="tag ${p.status}">${p.status === 'ongoing' ? 'Ongoing' : 'Completed'}</span>
          <span class="tag">${p.category}</span>
        </div>
        <div class="project-title">${p.title}</div>
        <p class="project-desc">${p.description.slice(0, 120)}…</p>
        <span class="project-link">Read more →</span>
      </div>
    `;
    card.addEventListener('click', () => openModal(p));
    grid.appendChild(card);
  });

  /* MODAL */
  const backdrop = document.getElementById('modal-backdrop');
  const modalInner = document.getElementById('modal-inner');

  function openModal(p) {
    const imgs = p.images.map(src => `<img src="${src}" alt="${p.title}" loading="lazy" />`).join('');
    modalInner.innerHTML = `
      <div class="project-tags" style="margin-bottom:0.5rem">
        <span class="tag ${p.status}">${p.status === 'ongoing' ? 'Ongoing' : 'Completed'}</span>
        <span class="tag">${p.category}</span>
      </div>
      <div class="modal-title">${p.title}</div>
      <p style="color:var(--muted);font-size:0.95rem;margin-top:0.5rem">${p.description}</p>
      <div class="modal-img-gallery">${imgs}</div>
    `;
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() {
    backdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ABOUT */
  const bio = document.getElementById('about-bio');
  d.bio.forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    bio.appendChild(p);
  });

  /* SKILLS */
  const skillsList = document.getElementById('skills-list');
  d.skills.forEach(s => {
    skillsList.innerHTML += `
      <div class="skill-item">
        <div class="skill-label">
          <span>${s.name}</span>
          <span style="color:var(--muted);font-size:0.8rem">${s.pct}%</span>
        </div>
        <div class="skill-bar">
          <div class="skill-fill" data-pct="${s.pct}"></div>
        </div>
      </div>
    `;
  });

  /* Animate skill bars when they scroll into view */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.querySelectorAll('.skill-fill').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      }
    });
  }, { threshold: 0.3 });
  observer.observe(document.getElementById('about'));

  /* CONNECT */
  const connectGrid = document.getElementById('connect-grid');
  d.links.forEach(link => {
    connectGrid.innerHTML += `
      <a class="connect-card" href="${link.url}" target="_blank" rel="noopener">
        <div class="connect-icon">${link.icon}</div>
        <span>${link.label}</span>
      </a>
    `;
  });

  /* FOOTER */
  document.getElementById('footer-text').textContent =
    `© ${new Date().getFullYear()} ${d.name} · Built with GitHub Pages`;

  /* HAMBURGER */
  const hamburger = document.getElementById('hamburger');
  const navLinks  = document.getElementById('nav-links');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

  /* ACTIVE NAV on scroll */
  const sections = ['projects','about','connect'];
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY + 80;
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const link = navLinks.querySelector(`a[href="#${id}"]`);
      if (!link) return;
      if (scrollY >= el.offsetTop && scrollY < el.offsetTop + el.offsetHeight) {
        navLinks.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        link.classList.add('active');
      }
    });
  }, { passive: true });

})();
</script>

</body>
</html>
