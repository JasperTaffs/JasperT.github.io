<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jasper Taffs — MEng Mechanical Engineer</title>
  <meta name="description" content="Mechanical Engineering portfolio of Jasper Taffs, MEng student at the University of Leeds." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       EASY UPDATE ZONE — change colours/fonts here
    ============================================= */
    :root {
      --accent:       #1D6FAA;
      --accent-light: #E8F2FA;
      --accent-dark:  #0F4C7A;
      --bg:           #F7F8FA;
      --surface:      #FFFFFF;
      --text:         #1A1A2E;
      --muted:        #6B7280;
      --border:       #E5E7EB;
      --nav-h:        64px;
      --font-head:    'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
      --radius:       12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 5vw, 4rem);
    }
    .nav-logo { font-family: var(--font-head); font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 0.25rem; list-style: none; }
    .nav-links a { padding: 0.4rem 0.75rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; color: var(--muted); transition: color 0.15s, background 0.15s; }
    .nav-links a:hover { color: var(--text); background: var(--border); }
    .nav-links a.active { color: var(--accent); }
    .nav-cta { background: var(--accent); color: #fff !important; border-radius: 8px; padding: 0.4rem 1rem !important; }
    .nav-cta:hover { background: var(--accent-dark) !important; color: #fff !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: transform 0.2s, opacity 0.2s; }

    /* HERO */
    .hero {
      max-width: 900px; margin: 0 auto;
      padding: clamp(3rem, 8vw, 6rem) clamp(1rem, 5vw, 2rem) 3rem;
      display: flex; align-items: center; gap: 3rem;
    }
    .hero-text { flex: 1; }
    .hero-eyebrow { display: inline-block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .hero-name { font-family: var(--font-head); font-size: clamp(2.4rem, 5vw, 3.6rem); font-weight: 600; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 1rem; }
    .hero-sub { font-size: 1.1rem; color: var(--muted); max-width: 42ch; margin-bottom: 1.75rem; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 2rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.65rem 1.4rem; border-radius: 8px; font-size: 0.92rem; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-outline { border-color: var(--border); color: var(--text); background: var(--surface); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* hero stats strip */
    .hero-stats { display: flex; flex-wrap: wrap; gap: 1.5rem; }
    .hero-stat { display: flex; flex-direction: column; }
    .hero-stat-value { font-family: var(--font-head); font-size: 1.4rem; font-weight: 600; line-height: 1.1; color: var(--text); }
    .hero-stat-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; }

    .hero-avatar { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 4px solid var(--surface); box-shadow: 0 0 0 2px var(--border); flex-shrink: 0; }

    /* CURRENTLY WORKING ON banner */
    .wip-banner {
      max-width: 900px; margin: 0 auto;
      padding: 0 clamp(1rem, 5vw, 2rem) 2rem;
    }
    .wip-inner {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.9rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .wip-dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; flex-shrink: 0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
    .wip-text { font-size: 0.9rem; color: var(--muted); }
    .wip-text strong { color: var(--text); font-weight: 600; }

    /* SECTION */
    section { max-width: 900px; margin: 0 auto; padding: 4rem clamp(1rem, 5vw, 2rem); scroll-margin-top: var(--nav-h); }
    .section-label { font-family: var(--font-head); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    .section-title { font-family: var(--font-head); font-size: clamp(1.6rem, 3vw, 2rem); font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .section-intro { color: var(--muted); max-width: 60ch; margin-bottom: 2.5rem; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* FILTER */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
    .filter-btn { padding: 0.35rem 1rem; border-radius: 999px; border: 1.5px solid var(--border); background: var(--surface); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--muted); }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* PROJECT CARDS */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.5rem; }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.22s cubic-bezier(.2,.8,.2,1), box-shadow 0.22s;
      cursor: pointer;
      display: flex; flex-direction: column;
    }
    .project-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.09); }
    .project-card[data-hidden="true"] { display: none; }

    /* IMAGE AREA — contain so nothing gets cropped */
    .project-img-wrap {
      width: 100%; height: 210px;
      background: #F0F4F8;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .project-img {
      width: 100%; height: 100%;
      object-fit: contain;
      transition: transform 0.4s ease;
    }
    .project-card:hover .project-img { transform: scale(1.04); }

    .project-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
    .tag { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 999px; background: var(--accent-light); color: var(--accent); }
    .tag.completed { background: #ECFDF5; color: #065F46; }
    .project-title { font-family: var(--font-head); font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
    .project-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.6; flex: 1; }
    .project-link { display: inline-flex; align-items: center; gap: 0.3rem; margin-top: 1rem; font-size: 0.85rem; font-weight: 500; color: var(--accent); }

    /* MODAL */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); max-width: 700px; width: 100%; max-height: 92vh; overflow-y: auto; position: relative; }
    .modal-close { position: sticky; top: 0; float: right; margin: 1rem 1rem 0 0; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; z-index: 10; }
    .modal-inner { padding: 1.5rem 2rem 2rem; clear: both; }
    .modal-title { font-family: var(--font-head); font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }

    /* CAROUSEL inside modal */
    .carousel { position: relative; margin: 1.25rem 0; border-radius: 10px; overflow: hidden; background: #F0F4F8; }
    .carousel-track { display: flex; transition: transform 0.35s cubic-bezier(.4,0,.2,1); }
    .carousel-slide { min-width: 100%; display: flex; align-items: center; justify-content: center; height: 320px; }
    .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.9); border: 1px solid var(--border);
      border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; z-index: 5;
      transition: background 0.15s;
    }
    .carousel-btn:hover { background: #fff; }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }
    .carousel-dots { display: flex; justify-content: center; gap: 6px; padding: 8px 0 0; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background 0.15s, transform 0.15s; }
    .carousel-dot.active { background: var(--accent); transform: scale(1.3); }

    /* ABOUT */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
    .about-bio p { color: var(--muted); margin-bottom: 1rem; }

    /* SKILL CHIPS — replaces progress bars */
    .skill-chips { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .skill-chip {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .skill-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .skill-chip-icon { font-size: 1rem; line-height: 1; }

    /* CONNECT */
    .connect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .connect-card { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.15s; font-weight: 500; }
    .connect-card:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .connect-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }

    footer { text-align: center; padding: 2rem 1rem; font-size: 0.85rem; color: var(--muted); border-top: 1px solid var(--border); }

    @media (max-width: 700px) {
      .hero { flex-direction: column-reverse; align-items: flex-start; gap: 1.5rem; }
      .hero-avatar { width: 110px; height: 110px; }
      .about-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .nav-links.open { display: flex; flex-direction: column; position: absolute; top: var(--nav-h); left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem; gap: 0.25rem; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

<script>
(function() {
  const d = SITE_DATA;

  /* NAV logo */
  document.getElementById('nav-logo').innerHTML =
    d.name.split(' ').map((w,i) => i===1 ? `<span>${w}</span>` : w).join(' ');

  /* HERO */
  document.getElementById('hero-eyebrow').textContent = d.university;
  document.getElementById('hero-name').textContent = d.name;
  document.getElementById('hero-sub').textContent = d.role + ' — building things that matter.';
  document.getElementById('hero-actions').innerHTML = `
    <a class="btn btn-primary" href="#projects">View projects</a>
    <a class="btn btn-outline" href="#connect">Get in touch</a>
  `;

  /* hero stats */
  const statsEl = document.getElementById('hero-stats');
  d.stats.forEach((s, i) => {
    if (i > 0) statsEl.insertAdjacentHTML('beforeend',
      `<div style="width:1px;height:2rem;background:var(--border);align-self:center;"></div>`);
    statsEl.insertAdjacentHTML('beforeend', `
      <div class="hero-stat">
        <span class="hero-stat-value">${s.value}</span>
        <span class="hero-stat-label">${s.label}</span>
      </div>
    `);
  });

  /* WIP banner */
  document.getElementById('wip-banner').innerHTML = `
    <div class="wip-inner">
      <div class="wip-dot"></div>
      <p class="wip-text"><strong>Currently working on:</strong> ${d.currentWork}</p>
    </div>
  `;

  /* PROJECTS filter tabs */
  const categories = ['All', ...new Set(d.projects.map(p => p.category))];
  const filterBar = document.getElementById('filter-bar');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.project-card').forEach(card => {
        card.dataset.hidden = (cat !== 'All' && card.dataset.category !== cat) ? 'true' : 'false';
      });
    });
    filterBar.appendChild(btn);
  });

  document.getElementById('projects-intro').textContent =
    'A selection of engineering projects — from energy harvesting to medical devices.';

  /* PROJECTS cards */
  const grid = document.getElementById('projects-grid');
  d.projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.dataset.category = p.category;
    card.dataset.hidden = 'false';
    card.innerHTML = `
      <div class="project-img-wrap">
        <img class="project-img" src="${p.coverImage}" alt="${p.title}" loading="lazy" />
      </div>
      <div class="project-body">
        <div class="project-tags">
          <span class="tag ${p.status}">${p.status === 'ongoing' ? 'Ongoing' : 'Completed'}</span>
          <span class="tag">${p.category}</span>
        </div>
        <div class="project-title">${p.title}</div>
        <p class="project-desc">${p.description.slice(0, 120)}…</p>
        <span class="project-link">Read more →</span>
      </div>
    `;
    card.addEventListener('click', () => openModal(p));
    grid.appendChild(card);
  });

  /* MODAL with carousel */
  const backdrop = document.getElementById('modal-backdrop');
  const modalInner = document.getElementById('modal-inner');
  let currentSlide = 0;

  function openModal(p) {
    currentSlide = 0;
    const slides = p.images.map(src =>
      `<div class="carousel-slide"><img src="${src}" alt="${p.title}" loading="lazy" /></div>`
    ).join('');
    const dots = p.images.map((_,i) =>
      `<div class="carousel-dot${i===0?' active':''}" data-i="${i}"></div>`
    ).join('');

    modalInner.innerHTML = `
      <div class="project-tags" style="margin-bottom:0.5rem">
        <span class="tag ${p.status}">${p.status === 'ongoing' ? 'Ongoing' : 'Completed'}</span>
        <span class="tag">${p.category}</span>
      </div>
      <div class="modal-title">${p.title}</div>
      <p style="color:var(--muted);font-size:0.95rem;margin-top:0.5rem;margin-bottom:0">${p.description}</p>
      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carousel-track">${slides}</div>
        ${p.images.length > 1 ? `
          <button class="carousel-btn prev" id="car-prev">&#8592;</button>
          <button class="carousel-btn next" id="car-next">&#8594;</button>
        ` : ''}
      </div>
      ${p.images.length > 1 ? `<div class="carousel-dots" id="carousel-dots">${dots}</div>` : ''}
    `;

    function goTo(n) {
      currentSlide = (n + p.images.length) % p.images.length;
      document.getElementById('carousel-track').style.transform = `translateX(-${currentSlide * 100}%)`;
      document.querySelectorAll('.carousel-dot').forEach((dot, i) =>
        dot.classList.toggle('active', i === currentSlide));
    }

    if (p.images.length > 1) {
      document.getElementById('car-prev').addEventListener('click', () => goTo(currentSlide - 1));
      document.getElementById('car-next').addEventListener('click', () => goTo(currentSlide + 1));
      document.querySelectorAll('.carousel-dot').forEach(dot =>
        dot.addEventListener('click', () => goTo(+dot.dataset.i)));
    }

    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowRight' && backdrop.classList.contains('open')) {
      const nextBtn = document.getElementById('car-next');
      if (nextBtn) nextBtn.click();
    }
    if (e.key === 'ArrowLeft' && backdrop.classList.contains('open')) {
      const prevBtn = document.getElementById('car-prev');
      if (prevBtn) prevBtn.click();
    }
  });
  function closeModal() { backdrop.classList.remove('open'); document.body.style.overflow = ''; }

  /* ABOUT bio */
  const bioEl = document.getElementById('about-bio');
  d.bio.forEach(para => {
    const p = document.createElement('p'); p.textContent = para; bioEl.appendChild(p);
  });

  /* SKILL CHIPS */
  const chips = document.getElementById('skill-chips');
  d.skills.forEach(s => {
    chips.insertAdjacentHTML('beforeend', `
      <div class="skill-chip">
        <span class="skill-chip-icon">${s.icon}</span>
        <span>${s.name}</span>
      </div>
    `);
  });

  /* CONNECT */
  const connectGrid = document.getElementById('connect-grid');
  d.links.forEach(link => {
    connectGrid.insertAdjacentHTML('beforeend', `
      <a class="connect-card" href="${link.url}" target="_blank" rel="noopener">
        <div class="connect-icon">${link.icon}</div>
        <span>${link.label}</span>
      </a>
    `);
  });

  /* FOOTER */
  document.getElementById('footer-text').textContent =
    `© ${new Date().getFullYear()} ${d.name} · Built with GitHub Pages`;

  /* HAMBURGER */
  const hamburger = document.getElementById('hamburger');
  const navLinks  = document.getElementById('nav-links');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

  /* ACTIVE NAV on scroll */
  const sections = ['projects','about','connect'];
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY + 80;
    sections.forEach(id => {
      const el = document.getElementById(id);
      const link = navLinks.querySelector(`a[href="#${id}"]`);
      if (!el || !link) return;
      if (scrollY >= el.offsetTop && scrollY < el.offsetTop + el.offsetHeight) {
        navLinks.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        link.classList.add('active');
      }
    });
  }, { passive: true });

})();
</script>
</body>
</html>
